---
name: gitlab-create-core

"on":
  workflow_call:
    inputs:
      validated-payload:
        required: true
        type: string
      github-install-token:
        required: true
        type: string
      target-org:
        required: true
        type: string
      target-profile:
        required: true
        type: string
      shared-repo:
        required: true
        type: string
      shared-ref:
        required: true
        type: string
      bws-version:
        required: true
        type: string
      bws-sha256:
        required: true
        type: string
      bws-secrets:
        required: false
        type: string
        default: ""
    secrets:
      BWS_ACCESS_TOKEN:
        required: true
      BWS_PROJECT_ID:
        required: true

permissions: {}

jobs:
  gitlab_create:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Validate shared inputs
        shell: bash
        env:
          SHARED_REPO: ${{ inputs.shared-repo }}
          SHARED_REF: ${{ inputs.shared-ref }}
          VALIDATED_PAYLOAD: ${{ inputs.validated-payload }}
          GH_INSTALL_TOKEN: ${{ inputs.github-install-token }}
        run: |
          set -euo pipefail
          allowed_repo="shared-common/gh-actions-shared"
          allowed_refs="v0.0.39"
          if [ "$SHARED_REPO" != "$allowed_repo" ]; then
            printf '%s\n' "shared-repo not allowed: $SHARED_REPO" >&2
            exit 1
          fi
          allowed=false
          for ref in $allowed_refs; do
            if [ "$SHARED_REF" = "$ref" ]; then
              allowed=true
              break
            fi
          done
          if [ "$allowed" != "true" ]; then
            printf '%s\n' "shared-ref not allowlisted: $SHARED_REF" >&2
            exit 1
          fi
          max_bytes=262144
          payload_size="$(
            printf '%s' "$VALIDATED_PAYLOAD" | wc -c | tr -d '[:space:]'
          )"
          if [ "${payload_size}" -gt "${max_bytes}" ]; then
            printf '%s\n' "validated-payload too large: ${payload_size} bytes" >&2
            exit 1
          fi
          if [ -z "$GH_INSTALL_TOKEN" ]; then
            printf '%s\n' "github-install-token must not be empty" >&2
            exit 1
          fi

      - name: Checkout shared workflows
        # actions/checkout v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: ${{ inputs.shared-repo }}
          ref: ${{ inputs.shared-ref }}
          path: shared

      - name: Setup Python
        # actions/setup-python v6.1.0
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548
        with:
          python-version: "3.14.2"

      - name: Resolve BWS secrets
        id: resolve_bws
        shell: bash
        env:
          TARGET_PROFILE: ${{ inputs.target-profile }}
          BWS_SECRETS_OVERRIDE: ${{ inputs.bws-secrets }}
        run: |
          set -euo pipefail
          default_secrets="$(
            python3 shared/.github/scripts/print_gitlab_sync_bws_secrets.py \
              --profile "${TARGET_PROFILE}" \
              --mode create
          )"
          override_clean="$(printf '%s' "${BWS_SECRETS_OVERRIDE}" | tr -d '[:space:]')"
          if [ -n "${override_clean}" ]; then
            secrets="$(
              python3 -c 'import sys; ordered = []; seen = set(); [ordered.append(item) or seen.add(item) for raw in sys.argv[1:] for item in [part.strip() for part in raw.split(",")] if item and item not in seen]; print(",".join(ordered))' "${default_secrets}" "${override_clean}"
            )"
            printf 'secrets=%s\n' "${secrets}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          printf 'secrets=%s\n' "${default_secrets}" >> "$GITHUB_OUTPUT"

      - name: Fetch secrets from BWS
        uses: ./shared/.github/actions/bws-fetch
        with:
          access-token: ${{ secrets.BWS_ACCESS_TOKEN }}
          project-id: ${{ secrets.BWS_PROJECT_ID }}
          bws-version: ${{ inputs.bws-version }}
          bws-sha256: ${{ inputs.bws-sha256 }}
          secrets: ${{ steps.resolve_bws.outputs.secrets }}
          output-dir: shared/.secrets

      - name: Write validated payload
        shell: bash
        run: |
          set -euo pipefail
          cat <<'JSON' > validated.json
          ${{ inputs.validated-payload }}
          JSON

      - name: Write installation token
        shell: bash
        run: |
          set -euo pipefail
          token='${{ inputs.github-install-token }}'
          echo "::add-mask::$token"
          printf '%s' "$token" > gh_install_token.txt

      - name: GitLab create
        shell: bash
        env:
          INPUT_PATH: validated.json
          OUTPUT_PATH: summary.json
          TARGET_ORG: ${{ inputs.target-org }}
          TARGET_PROFILE: ${{ inputs.target-profile }}
          GH_INSTALL_TOKEN_FILE: gh_install_token.txt
        run: |
          set -euo pipefail
          python3 shared/.github/scripts/gitlab_sync.py

      - name: Render summary
        shell: bash
        run: |
          set -euo pipefail
          INPUT_PATH=summary.json OUTPUT_PATH=summary.md \
            python3 shared/.github/scripts/summary_render.py

      - name: Publish summary
        uses: ./shared/.github/actions/job-summary
        with:
          summary-path: summary.md

      - name: Cleanup secrets
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -f gh_install_token.txt
          rm -rf shared/.secrets
